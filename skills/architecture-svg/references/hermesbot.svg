  <!-- Model labels under Bedrock -->
  <text x="135" y="568" text-anchor="middle" font-size="9" fill="#8b949e">Opus 4.6 · Sonnet 4.6 · DeepSeek R1</text>
  <text x="325" y="568" text-anchor="middle" font-size="9" fill="#8b949e">Linear Perpetual · 6 Symbols</text>
  <text x="515" y="568" text-anchor="middle" font-size="9" fill="#8b949e">WAL Mode · Trades · Decisions</text>
  <text x="705" y="568" text-anchor="middle" font-size="9" fill="#8b949e">F&amp;G · BTC Dom · Macro · DEFCON</text>

