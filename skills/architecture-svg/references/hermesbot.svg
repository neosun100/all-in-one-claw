  <rect x="30" y="50" width="900" height="52" rx="10" fill="url(#frontendGrad)" opacity="0.15" stroke="#0ea5e9" stroke-width="1"/>
  <text x="480" y="72" text-anchor="middle" font-size="12" fill="#67e8f9" font-weight="600">⚛ REACT 19 FRONTEND — Dashboard · Trades · Scanner · Strategy · Research · Vibe</text>
  <text x="480" y="90" text-anchor="middle" font-size="10" fill="#8b949e">REST API (50+ endpoints) + WebSocket (real-time positions, decisions, PnL)</text>

  <!-- Arrow: Frontend → Backend -->
  <path d="M480,102 L480,118" fill="none" stroke="#4cc9f0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Backend Container ===== -->
  <rect x="30" y="120" width="900" height="400" rx="14" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="50" y="142" font-size="11" fill="#8b949e" font-weight="600" letter-spacing="1">⚡ FASTAPI BACKEND (:8000)</text>

