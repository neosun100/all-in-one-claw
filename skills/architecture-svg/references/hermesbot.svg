  <text x="247" y="348" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="600">⚖ Strategy Eval</text>
  <text x="247" y="362" text-anchor="middle" font-size="9" fill="#93c5fd">Win Rate · PnL · Health</text>

  <rect x="320" y="328" width="125" height="50" rx="8" fill="url(#agentGrad)" opacity="0.9"/>
  <text x="382" y="348" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="600">🎓 Learner</text>
  <text x="382" y="362" text-anchor="middle" font-size="9" fill="#93c5fd">Skills · Rules · Exp</text>

  <rect x="455" y="328" width="125" height="50" rx="8" fill="url(#agentGrad)" opacity="0.9"/>
  <text x="517" y="348" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="600">🔬 Research</text>
