  <text x="70" y="628" font-size="10" fill="#e6edf3">AI: Claude Opus 4.6 + Sonnet 4.6 + DeepSeek R1 via AWS Bedrock</text>
  <text x="70" y="644" font-size="10" fill="#e6edf3">Backend: Python 3.11+ · FastAPI · Strands Agents SDK · pandas-ta · aiosqlite</text>
  <text x="70" y="660" font-size="10" fill="#e6edf3">Frontend: React 19 · TypeScript · Vite 6 · Tailwind CSS 4 · Recharts</text>
  <text x="550" y="628" font-size="10" fill="#e6edf3">Exchange: Bybit API v5 (pybit) · USDT Perpetual</text>
  <text x="550" y="644" font-size="10" fill="#e6edf3">Database: SQLite WAL · 20 tables · Indexed</text>
  <text x="550" y="660" font-size="10" fill="#e6edf3">Infra: Docker · Nginx · AWS Bedrock Cross-Region</text>
