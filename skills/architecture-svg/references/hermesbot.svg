  <text x="382" y="302" text-anchor="middle" font-size="9" fill="#93c5fd">Funding · OI · Volume</text>

  <rect x="455" y="268" width="125" height="50" rx="8" fill="url(#agentGrad)" opacity="0.9"/>
  <text x="517" y="288" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="600">📰 News Intel</text>
  <text x="517" y="302" text-anchor="middle" font-size="9" fill="#93c5fd">RSS · DEFCON · Macro</text>

