  <text x="652" y="288" text-anchor="middle" font-size="10" fill="#e6edf3" font-weight="600">🔍 Scanner</text>
  <text x="652" y="302" text-anchor="middle" font-size="9" fill="#93c5fd">Playwright · Charts</text>

