  <path d="M460,248 L382,268" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <path d="M500,248 L517,268" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <path d="M540,248 L652,268" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
